  <text class="sans" x="80" y="598" font-size="22" font-weight="600" fill="#14110e">github-contributions.com</text>
  <text class="sans" x="1120" y="598" text-anchor="end" font-size="22" font-weight="400" fill="#5a5349">made by @joshferge</text>
