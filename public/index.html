<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GitHub contributions in the AI era</title>
    <meta
      name="description"
      content="Chart any GitHub user's monthly contributions, overlaid with the launch dates of major AI coding tools."
    />
    <meta property="og:title" content="GitHub contributions in the AI era" />
    <meta
      property="og:description"
      content="Paste a GitHub username. See their monthly contributions since 2021, overlaid with AI tool launches."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
    <style>
      :root {
        --paper: #f4eede;
        --ink: #14110e;
        --ink-soft: #5a5349;
        --ink-faint: #8a7f70;
        --rule: rgba(20, 17, 14, 0.12);
        --accent: #c8344a;
        --accent-soft: rgba(200, 52, 74, 0.12);
        --sans: "Geist", ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }

      body {
        background: var(--paper);
        color: var(--ink);
        font-family: var(--sans);
        font-feature-settings: "ss01", "ss02", "cv11";
        line-height: 1.5;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      main {
        max-width: 1080px;
        margin: 0 auto;
        padding: 24px 32px 64px;
      }

      /* ---------- Hero ---------- */
      .hero {
        text-align: center;
        margin-bottom: 28px;
      }
      h1 {
        font-family: var(--sans);
        font-weight: 600;
        font-size: clamp(22px, 3vw, 32px);
        line-height: 1.2;
        letter-spacing: -0.02em;
        margin: 0 0 8px;
        color: var(--ink);
      }
      .tagline {
        font-size: 15px;
        color: var(--ink-soft);
        margin: 0;
        max-width: 560px;
        margin-left: auto;
        margin-right: auto;
      }

      /* ---------- Search ---------- */
      .search {
        max-width: 640px;
        margin: 0 auto 16px;
        display: flex;
        align-items: stretch;
        background: #fff;
        border: 1px solid var(--rule);
        border-radius: 12px;
        box-shadow: 0 1px 2px rgba(20, 17, 14, 0.04);
        overflow: hidden;
        transition: box-shadow 0.2s ease, border-color 0.2s ease;
      }
      .search:focus-within {
        border-color: var(--ink);
        box-shadow: 0 4px 16px rgba(20, 17, 14, 0.08);
      }
      .input-wrap {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0 16px;
        min-width: 0;
      }
      .at-symbol {
        font-size: 18px;
        color: var(--ink-faint);
        font-weight: 500;
      }
      input[type="search"] {
        flex: 1;
        border: 0;
        background: transparent;
        font-family: var(--sans);
        font-weight: 500;
        font-size: 17px;
        letter-spacing: -0.01em;
        color: var(--ink);
        padding: 16px 0;
        outline: none;
        min-width: 0;
        -webkit-appearance: none;
        appearance: none;
      }
      input[type="search"]::placeholder {
        color: var(--ink-faint);
        font-weight: 400;
      }
      input[type="search"]::-webkit-search-decoration,
      input[type="search"]::-webkit-search-cancel-button,
      input[type="search"]::-webkit-search-results-button,
      input[type="search"]::-webkit-search-results-decoration {
        -webkit-appearance: none;
        display: none;
      }
      button[type="submit"] {
        border: 0;
        background: var(--accent);
        color: #fff;
        font-family: var(--sans);
        font-weight: 600;
        font-size: 15px;
        letter-spacing: -0.005em;
        padding: 0 24px;
        cursor: pointer;
        transition: background 0.18s ease;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      button[type="submit"]:hover:not(:disabled) {
        background: #a8253b;
      }
      button[type="submit"]:disabled {
        opacity: 0.5;
        cursor: progress;
      }
      button[type="submit"] .arrow {
        transition: transform 0.2s ease;
      }
      button[type="submit"]:hover:not(:disabled) .arrow {
        transform: translateX(3px);
      }
      .examples {
        max-width: 640px;
        margin: 0 auto 24px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        font-size: 13px;
        color: var(--ink-faint);
      }
      .examples span { margin-right: 4px; }
      .examples button.chip {
        background: transparent;
        border: 1px solid var(--rule);
        color: var(--ink-soft);
        font-family: var(--sans);
        font-size: 13px;
        padding: 4px 10px;
        border-radius: 999px;
        cursor: pointer;
        transition: all 0.15s ease;
      }
      .examples button.chip:hover {
        border-color: var(--ink);
        color: var(--ink);
        background: rgba(20, 17, 14, 0.04);
      }

      /* ---------- Controls ---------- */
      .controls {
        display: flex;
        justify-content: center;
        gap: 20px;
        align-items: center;
        font-family: var(--sans);
        font-size: 13px;
        color: var(--ink-soft);
        margin-bottom: 20px;
        flex-wrap: wrap;
      }
      .controls label {
        display: inline-flex;
        gap: 6px;
        align-items: center;
        cursor: pointer;
        user-select: none;
      }
      .controls input[type="checkbox"] {
        appearance: none;
        width: 14px; height: 14px;
        border: 1.5px solid var(--ink-soft);
        background: #fff;
        cursor: pointer;
        position: relative;
        border-radius: 3px;
        margin: 0;
      }
      .controls input[type="checkbox"]:checked {
        background: var(--ink);
        border-color: var(--ink);
      }
      .controls input[type="checkbox"]:checked::after {
        content: "";
        position: absolute;
        left: 3px; top: 0;
        width: 4px; height: 8px;
        border: solid #fff;
        border-width: 0 1.5px 1.5px 0;
        transform: rotate(45deg);
      }
      .controls select {
        appearance: none;
        border: 1px solid var(--rule);
        background: #fff;
        font-family: var(--sans);
        font-size: 13px;
        color: var(--ink);
        padding: 4px 24px 4px 10px;
        border-radius: 6px;
        cursor: pointer;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M1 1l4 4 4-4' stroke='%2314110e' stroke-width='1.3' fill='none'/></svg>");
        background-repeat: no-repeat;
        background-position: right 8px center;
      }

      /* ---------- Chart card ---------- */
      .chart-card {
        background: #fff;
        border: 1px solid var(--rule);
        border-radius: 14px;
        padding: 20px 20px 16px;
        box-shadow: 0 1px 2px rgba(20, 17, 14, 0.03);
      }
      .chart-head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 16px;
        margin-bottom: 8px;
        flex-wrap: wrap;
      }
      .chart-title {
        font-family: var(--sans);
        font-weight: 600;
        font-size: 15px;
        margin: 0;
        color: var(--ink);
      }
      .chart-title .muted {
        color: var(--ink-faint);
        font-weight: 400;
      }
      .chart-stats {
        font-size: 13px;
        color: var(--ink-soft);
      }
      .chart-stats .big {
        font-weight: 600;
        color: var(--ink);
        font-size: 15px;
        margin-right: 4px;
      }

      #chart-wrap {
        position: relative;
        height: calc(100vh - 340px);
        min-height: 340px;
        max-height: 560px;
      }
      #status {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        color: var(--ink-faint);
        text-align: center;
        padding: 0 32px;
      }
      #status.error { color: var(--accent); }
      #status.hidden { display: none; }

      /* ---------- Share row ---------- */
      .share-row {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-top: 16px;
      }
      .share-row button {
        background: transparent;
        border: 1px solid var(--rule);
        color: var(--ink-soft);
        font-family: var(--sans);
        font-size: 13px;
        font-weight: 500;
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.15s ease;
      }
      .share-row button:hover {
        border-color: var(--ink);
        color: var(--ink);
        background: rgba(20, 17, 14, 0.04);
      }
      .share-row button.primary {
        background: var(--ink);
        border-color: var(--ink);
        color: #fff;
        display: inline-flex;
        align-items: center;
      }
      .share-row button.primary:hover {
        background: #000;
        color: #fff;
      }

      /* ---------- Footer ---------- */
      footer {
        margin-top: 40px;
        text-align: center;
        font-size: 15px;
        color: var(--ink-soft);
      }
      footer a {
        color: var(--ink);
        text-decoration: none;
        border-bottom: 1px solid var(--rule);
      }
      footer a:hover { color: var(--ink); border-bottom-color: var(--ink); }

      @media (max-width: 640px) {
        main { padding: 28px 16px 48px; }
        .hero { margin-bottom: 20px; }
        .search { border-radius: 10px; }
        button[type="submit"] { padding: 0 16px; font-size: 14px; }
        .chart-head { flex-direction: column; gap: 4px; }
        #chart-wrap { height: 420px; max-height: none; }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <h1>GitHub contributions in the AI era</h1>
        <p class="tagline">
          Chart any GitHub user's monthly contributions since 2021, overlaid with when the major AI coding tools shipped.
        </p>
      </section>

      <form class="search" id="form">
        <div class="input-wrap">
          <span class="at-symbol">@</span>
          <input
            id="handle"
            name="gh-handle"
            type="search"
            autocomplete="off"
            autocapitalize="none"
            autocorrect="off"
            spellcheck="false"
            data-1p-ignore="true"
            data-lpignore="true"
            data-bwignore="true"
            data-form-type="other"
            placeholder="GitHub username"
            required
          />
        </div>
        <button type="submit" id="submit">
          Go <span class="arrow">→</span>
        </button>
      </form>

      <div class="examples">
        <span>Try:</span>
        <button type="button" class="chip" data-user="torvalds">torvalds</button>
        <button type="button" class="chip" data-user="mitsuhiko">mitsuhiko</button>
        <button type="button" class="chip" data-user="dcramer">dcramer</button>
        <button type="button" class="chip" data-user="JoshFerge">JoshFerge</button>
      </div>

      <div class="controls">
        <label>
          <input type="checkbox" id="toggle-markers" checked />
          AI tool markers
        </label>
        <label>
          <input type="checkbox" id="toggle-smoothing" checked />
          Smooth (3-month avg)
        </label>
      </div>

      <section class="chart-card">
        <div id="chart-wrap">
          <canvas id="chart"></canvas>
          <div id="status"></div>
        </div>

        <div class="share-row" id="share-row" style="display:none;">
          <button type="button" id="share-x" class="primary">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" style="margin-right:6px;vertical-align:-2px;"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            Share
          </button>
          <button type="button" id="copy-link">Copy link</button>
          <button type="button" id="copy-image">Copy image</button>
          <button type="button" id="download-png">Download PNG</button>
        </div>
      </section>

      <footer>
        Made by <a href="https://x.com/joshferge" target="_blank" rel="noopener">JoshFerge</a>.
        Data from the public
        <a href="https://docs.github.com/en/graphql" target="_blank" rel="noopener">GitHub GraphQL</a>.
        Source on
        <a href="https://github.com/JoshFerge/my-github-contributions" target="_blank" rel="noopener">GitHub</a>.
      </footer>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      const form = $("form");
      const input = $("handle");
      const submit = $("submit");
      const status = $("status");
      const canvas = $("chart");
      const toggleMarkers = $("toggle-markers");
      const toggleSmoothing = $("toggle-smoothing");
      const SMOOTH_WINDOW = 3;

      function computeSmoothed(series, window) {
        return series.map((_, i) => {
          const start = Math.max(0, i - window + 1);
          const w = series.slice(start, i + 1);
          const avg = w.reduce((s, p) => s + p.count, 0) / w.length;
          return Math.round(avg * 10) / 10;
        });
      }
      const copyLinkBtn = $("copy-link");
      const copyImageBtn = $("copy-image");
      const downloadBtn = $("download-png");
      const shareXBtn = $("share-x");
      const shareRow = $("share-row");

      // AI coding tool launch dates, hardcoded. Edit this list to add/remove markers.
      const MARKERS = [
        { date: "2022-11-30", label: "ChatGPT" },
        { date: "2023-03-14", label: "GPT-4" },
        { date: "2024-06-20", label: "Claude 3.5 Sonnet" },
        { date: "2025-05-22", label: "Claude 4 Opus" },
        { date: "2026-02-05", label: "Claude Opus 4.6" },
      ];

      let chart = null;
      let lastData = null;

      function setStatus(msg, isError = false) {
        if (!msg) {
          status.classList.add("hidden");
          status.textContent = "";
          return;
        }
        status.classList.remove("hidden");
        status.textContent = msg;
        status.className = isError ? "error" : "";
      }

      function monthLabel(ym) {
        const [y, m] = ym.split("-").map(Number);
        const d = new Date(Date.UTC(y, m - 1, 1));
        return d.toLocaleDateString("en-US", { month: "long", year: "numeric", timeZone: "UTC" });
      }

      function monthIndex(series, ym) {
        return series.findIndex((p) => p.month === ym);
      }

      const FONT_SANS = '"Geist", ui-sans-serif, -apple-system, sans-serif';
      const FONT_MONO = '"JetBrains Mono", ui-monospace, monospace';

      // White background so exported PNGs aren't transparent.
      const whiteBgPlugin = {
        id: "whiteBg",
        beforeDraw(chart) {
          const { ctx } = chart;
          ctx.save();
          ctx.globalCompositeOperation = "destination-over";
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(0, 0, chart.width, chart.height);
          ctx.restore();
        },
      };


      function renderChart(data) {
        lastData = data;
        setStatus("");
        const labels = data.series.map((p) => monthLabel(p.month));
        const smoothingOn = toggleSmoothing.checked;
        const values = smoothingOn
          ? computeSmoothed(data.series, SMOOTH_WINDOW)
          : data.series.map((p) => p.count);

        const seriesLabel = smoothingOn
          ? "3-month moving average"
          : "monthly contributions";
        const total = data.series.reduce((s, p) => s + p.count, 0);

        const datasets = [
          {
            label: seriesLabel,
            data: values,
            borderColor: "#c8344a",
            backgroundColor: "rgba(200, 52, 74, 0.1)",
            fill: true,
            tension: 0.38,
            pointRadius: 0,
            pointHoverRadius: 5,
            pointHoverBackgroundColor: "#c8344a",
            pointHoverBorderColor: "#fff",
            pointHoverBorderWidth: 2,
            borderWidth: 2.5,
          },
        ];

        const markerAnnotations = {};
        if (toggleMarkers.checked) {
          for (const m of MARKERS) {
            const ym = m.date.slice(0, 7);
            const idx = monthIndex(data.series, ym);
            if (idx === -1) continue;
            markerAnnotations[`m-${m.date}`] = {
              type: "line",
              xMin: idx,
              xMax: idx,
              borderColor: "rgba(20, 17, 14, 0.32)",
              borderWidth: 1,
              borderDash: [3, 4],
              label: {
                display: true,
                content: m.label,
                position: "start",
                backgroundColor: "rgba(255, 255, 255, 0.96)",
                color: "#14110e",
                font: { family: FONT_SANS, size: 11, weight: "500" },
                padding: { top: 3, bottom: 3, left: 6, right: 6 },
                borderColor: "rgba(20, 17, 14, 0.15)",
                borderWidth: 1,
                borderRadius: 4,
              },
            };
          }
        }

        const config = {
          type: "line",
          data: { labels, datasets },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            animations: { colors: false, x: false, y: false },
            transitions: { active: { animation: { duration: 0 } } },
            interaction: { mode: "index", intersect: false },
            scales: {
              x: {
                grid: { display: false },
                border: { color: "rgba(20, 17, 14, 0.2)", width: 1 },
                ticks: {
                  maxRotation: 0,
                  autoSkipPadding: 24,
                  color: "#5a5349",
                  font: { family: FONT_SANS, size: 11 },
                },
              },
              y: {
                beginAtZero: true,
                grid: { color: "rgba(20, 17, 14, 0.06)", drawTicks: false },
                border: { display: false },
                ticks: {
                  color: "#8a7f70",
                  font: { family: FONT_SANS, size: 11 },
                  padding: 8,
                  maxTicksLimit: 6,
                },
              },
            },
            layout: {
              padding: { top: 4, right: 12, bottom: 4, left: 4 },
            },
            plugins: {
              legend: { display: false },
              title: {
                display: true,
                text: `@${data.username} — GitHub contributions`,
                align: "start",
                color: "#14110e",
                font: { family: FONT_SANS, size: 18, weight: "600" },
                padding: { top: 4, bottom: 2 },
              },
              subtitle: {
                display: true,
                text: seriesLabel,
                align: "start",
                color: "#5a5349",
                font: { family: FONT_SANS, size: 13, weight: "400" },
                padding: { top: 0, bottom: 14 },
              },
              tooltip: {
                backgroundColor: "#14110e",
                titleColor: "#f4eede",
                bodyColor: "#f4eede",
                titleFont: { family: FONT_SANS, size: 12, weight: "600" },
                bodyFont: { family: FONT_SANS, size: 13 },
                cornerRadius: 6,
                padding: 10,
                displayColors: false,
                callbacks: {
                  title: (items) => items[0]?.label ?? "",
                },
              },
              annotation: { annotations: markerAnnotations },
            },
          },
        };

        // Right-aligned total, drawn at the title's baseline.
        const totalStatPlugin = {
          id: "totalStat",
          afterDraw(chart) {
            const ctx = chart.ctx;
            ctx.save();
            ctx.textAlign = "right";
            ctx.textBaseline = "top";
            const x = chart.width - 14;
            const y = 6;
            const numStr = total.toLocaleString();
            ctx.font = `600 18px ${FONT_SANS}`;
            ctx.fillStyle = "#14110e";
            const numWidth = ctx.measureText(numStr).width;
            ctx.fillText(numStr, x, y);
            ctx.font = `400 13px ${FONT_SANS}`;
            ctx.fillStyle = "#5a5349";
            ctx.fillText("total", x - numWidth - 6, y + 5);
            ctx.restore();
          },
        };

        if (chart) chart.destroy();
        chart = new Chart(canvas, {
          ...config,
          plugins: [whiteBgPlugin, totalStatPlugin],
        });
        shareRow.style.display = "flex";
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, (c) => ({
          "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
        }[c]));
      }

      async function load(username) {
        setStatus(`Loading @${username}…`);
        submit.disabled = true;
        try {
          const params = new URLSearchParams({
            username,
            from: "2021",
          });
          const res = await fetch(`/api/chart?${params}`);
          const body = await res.json();
          if (!res.ok) throw new Error(body.error || `HTTP ${res.status}`);
          if (!body.series?.length) {
            setStatus(`No contributions found for @${username}.`, true);
            if (chart) { chart.destroy(); chart = null; }
            shareRow.style.display = "none";
            return;
          }
          renderChart(body);
          const u = new URL(window.location.href);
          u.searchParams.set("u", username);
          history.replaceState(null, "", u.toString());
          document.title = `@${username} — GitHub contributions in the AI era`;
        } catch (err) {
          setStatus(err.message || "Something went wrong.", true);
          if (chart) { chart.destroy(); chart = null; }
          shareRow.style.display = "none";
        } finally {
          submit.disabled = false;
        }
      }

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const v = input.value.trim().replace(/^@/, "");
        if (!v) return;
        load(v);
      });

      document.querySelectorAll(".chip").forEach((chip) => {
        chip.addEventListener("click", () => {
          const u = chip.dataset.user;
          if (!u) return;
          input.value = u;
          load(u);
        });
      });

      for (const el of [toggleMarkers, toggleSmoothing]) {
        el.addEventListener("change", () => {
          if (lastData) renderChart(lastData);
        });
      }

      shareXBtn.addEventListener("click", () => {
        if (!lastData) return;
        const u = new URL(window.location.href);
        u.searchParams.set("u", lastData.username);
        const total = lastData.series.reduce((s, p) => s + p.count, 0);
        const text = `My GitHub contributions since 2021, overlaid with AI coding tool launches — ${total.toLocaleString()} contributions across ${lastData.series.length} months.`;
        const intent = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(u.toString())}`;
        window.open(intent, "_blank", "noopener,noreferrer");
      });

      copyLinkBtn.addEventListener("click", async () => {
        await navigator.clipboard.writeText(window.location.href);
        const orig = copyLinkBtn.textContent;
        copyLinkBtn.textContent = "Copied";
        setTimeout(() => (copyLinkBtn.textContent = orig), 1200);
      });

      copyImageBtn.addEventListener("click", async () => {
        if (!chart) return;
        const orig = copyImageBtn.textContent;
        try {
          if (typeof ClipboardItem === "undefined" || !navigator.clipboard?.write) {
            throw new Error("Clipboard API unavailable");
          }
          // Safari requires the Promise to be passed directly so the user-gesture
          // chain isn't broken by awaiting the blob first.
          const blobPromise = new Promise((resolve, reject) => {
            canvas.toBlob(
              (b) => (b ? resolve(b) : reject(new Error("toBlob returned null"))),
              "image/png",
            );
          });
          await navigator.clipboard.write([
            new ClipboardItem({ "image/png": blobPromise }),
          ]);
          copyImageBtn.textContent = "Copied";
        } catch (err) {
          console.error("Copy image failed:", err);
          // Fallback: download the PNG so the user still gets the image.
          try {
            const link = document.createElement("a");
            link.download = `${(lastData?.username ?? "chart")}-contributions.png`;
            link.href = canvas.toDataURL("image/png", 1);
            link.click();
            copyImageBtn.textContent = "Downloaded";
          } catch {
            copyImageBtn.textContent = "Copy failed";
          }
        }
        setTimeout(() => (copyImageBtn.textContent = orig), 1600);
      });

      downloadBtn.addEventListener("click", () => {
        if (!chart) return;
        const link = document.createElement("a");
        link.download = `${(lastData?.username ?? "chart")}-contributions.png`;
        link.href = canvas.toDataURL("image/png", 1);
        link.click();
      });

      setStatus("Enter a GitHub username above.");

      const annotationScript = document.createElement("script");
      annotationScript.src = "https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js";
      annotationScript.onload = () => {
        Chart.register(window["chartjs-plugin-annotation"]);
        const initial = new URL(window.location.href).searchParams.get("u");
        if (initial) {
          input.value = initial;
          load(initial);
        }
      };
      document.head.appendChild(annotationScript);
    </script>
  </body>
</html>
